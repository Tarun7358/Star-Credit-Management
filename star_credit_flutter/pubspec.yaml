name: star_credit_flutter
description: Star Credit Management - Unified Enterprise CRM Client
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase client
  supabase_flutter: ^2.6.0

  # Themes & Fonts
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1

  # Date formatting
  intl: ^0.19.0

  # Charts for Dashboards
  fl_chart: ^0.68.0

  # File handling
  file_picker: ^8.0.0
  excel: ^4.0.0

  # Biometric login
  local_auth: ^2.2.0
  shared_preferences: ^2.2.3

  # Exporting
  pdf: ^3.10.7
  printing: ^5.11.0

  # Icons
  cupertino_icons: ^1.0.6

  # GPS Geolocator and Digital Signatures
  geolocator: ^11.0.0
  signature: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
